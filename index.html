<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tour de Bierchen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f6f2;--bg2:#fff;--bg3:#f2ede6;--cop:#b5712a;--copl:#d4924a;--copd:#8a5218;--copbg:#fdf5eb;--tx:#1a1612;--tx2:#4a3f32;--txm:#9a8a78;--bd:#e8dfd0;--bds:#d4c4b0;--ok:#2e7d3c;--okbg:#edf7ef;--okb:#b8dfc0;--err:#c0392b;--errbg:#fdf0ee;--errb:#f0c0ba;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
#app{width:100%;max-width:460px;padding:0 0 48px;}

/* Header */
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 8px rgba(100,70,30,.07);position:sticky;top:0;z-index:10;}
.hdr h1{flex:1;font-size:1.35rem;font-weight:900;color:var(--copd);}
.hdr small{display:block;font-size:.72rem;color:var(--txm);font-style:italic;font-weight:300;}
.hdr-icon{font-size:1.8rem;}
.mbtn{order:-1;background:none;border:1.5px solid var(--bds);border-radius:8px;padding:7px 11px;cursor:pointer;font:600 .7rem 'Inter',sans-serif;color:var(--tx2);transition:.18s all;white-space:nowrap;}
.mbtn:hover,.mbtn.on{border-color:var(--cop);color:var(--cop);background:var(--copbg);}

/* Drawer */
.doverlay{position:fixed;inset:0;z-index:50;pointer-events:none;}
.doverlay.open{pointer-events:all;}
.dbackdrop{position:absolute;inset:0;background:rgba(26,22,18,0);transition:background .25s;}
.doverlay.open .dbackdrop{background:rgba(26,22,18,.45);}
.drawer{position:absolute;top:0;left:0;bottom:0;width:270px;max-width:80vw;background:var(--bg2);border-right:1px solid var(--bd);box-shadow:4px 0 20px rgba(100,70,30,.15);transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.doverlay.open .drawer{transform:translateX(0);}
.dhdr{padding:18px 16px 12px;border-bottom:1px solid var(--bd);background:var(--copbg);}
.dhdr-title{font-weight:800;color:var(--copd);}
.dhdr-sub{font-size:.7rem;color:var(--txm);margin-top:2px;}
.dbody{flex:1;overflow-y:auto;padding:10px 8px;}
.ov-list{display:flex;flex-direction:column;gap:6px;}
.ov-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:9px;border:1.5px solid var(--bd);background:var(--bg2);cursor:pointer;transition:.18s all;}
.ov-item:hover{border-color:var(--copl);background:var(--copbg);}
.ov-item.done{border-color:var(--okb);background:var(--okbg);}
.ov-item.active{border-color:var(--cop);background:var(--copbg);}
.ov-num{font-size:.9rem;font-weight:700;color:var(--txm);min-width:18px;}
.ov-item.done .ov-num{color:var(--ok);}
.ov-item.active .ov-num{color:var(--cop);}
.ov-info{flex:1;}
.ov-name{font-size:.83rem;font-weight:600;}
.ov-st{font-size:.69rem;color:var(--txm);margin-top:1px;}
.ov-item.done .ov-st{color:var(--ok);}
.ov-item.active .ov-st{color:var(--cop);}

/* Content */
.cnt{padding:16px 15px 0;}

/* Progress */
.prog{margin-bottom:14px;}
.prog-lbl{font-size:.63rem;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--txm);margin-bottom:6px;display:flex;justify-content:space-between;}
.prog-dots{display:flex;gap:4px;}
.dot{flex:1;height:5px;border-radius:3px;background:var(--bd);transition:background .4s;}
.dot.done{background:var(--ok);}
.dot.active{background:var(--cop);}
.dot.quiz{background:var(--copl);}

/* GPS badge */
.gpsbadge{display:inline-flex;align-items:center;gap:7px;font-size:.72rem;font-weight:500;padding:5px 11px;border-radius:20px;background:var(--bg2);border:1px solid var(--bd);margin-bottom:14px;color:var(--txm);}
.gpsdot{width:7px;height:7px;border-radius:50%;background:var(--txm);flex-shrink:0;}
.gpsdot.ok{background:var(--ok);box-shadow:0 0 5px rgba(46,125,60,.5);animation:blink 2s infinite;}
.gpsdot.err{background:var(--err);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* Card */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(100,70,30,.08),0 4px 14px rgba(100,70,30,.05);position:relative;}
.cline{position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.cline.cop{background:linear-gradient(90deg,var(--copd),var(--copl));}
.cline.grn{background:linear-gradient(90deg,var(--ok),#56c46a);}
.cline.amb{background:linear-gradient(90deg,#c87020,var(--copl));}
.cline.pnk{background:linear-gradient(90deg,#c0297b,#e05090);}

.stag{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--cop);background:var(--copbg);border:1px solid rgba(181,113,42,.2);border-radius:4px;padding:3px 7px;margin-bottom:9px;}
.stag.amb{color:#a05010;background:#fef8f0;border-color:rgba(181,113,42,.3);}
.ctitle{font-size:1.05rem;font-weight:800;color:var(--tx);margin-bottom:11px;line-height:1.3;}

/* Nav widget */
.navw{display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;padding:14px;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;margin-top:4px;}
.distval{font-size:2rem;font-weight:800;color:var(--copd);line-height:1;transition:color .4s;}
.distval.near{color:#c07828;}
.distval.close{color:var(--ok);}
.distlbl{font-size:.63rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--txm);margin-top:2px;}
.emojis{display:flex;gap:2px;margin-top:6px;font-size:1.1rem;}
.compass{display:flex;flex-direction:column;align-items:center;gap:4px;}
.cring{width:64px;height:64px;border-radius:50%;border:1.5px solid var(--bds);background:var(--bg2);display:flex;align-items:center;justify-content:center;position:relative;}
.cring::before{content:'';position:absolute;inset:5px;border-radius:50%;background:linear-gradient(0deg,transparent 47%,rgba(181,113,42,.3) 47%,rgba(181,113,42,.3) 53%,transparent 53%),linear-gradient(90deg,transparent 47%,rgba(181,113,42,.12) 47%,rgba(181,113,42,.12) 53%,transparent 53%);}
.clbls{position:absolute;inset:0;pointer-events:none;}
.cl{position:absolute;font-size:.48rem;font-weight:700;color:rgba(181,113,42,.55);}
.cl-n{top:3px;left:50%;transform:translateX(-50%);}
.cl-s{bottom:3px;left:50%;transform:translateX(-50%);}
.cl-e{right:3px;top:50%;transform:translateY(-50%);}
.cl-w{left:3px;top:50%;transform:translateY(-50%);}
.cdir{font-size:.65rem;font-weight:600;color:var(--cop);text-align:center;min-width:60px;}

/* Hint */
.hint{font-size:.88rem;line-height:1.65;color:var(--tx2);font-style:italic;background:var(--bg3);border-left:3px solid var(--cop);padding:9px 13px;border-radius:0 6px 6px 0;margin-bottom:14px;}

/* Reveal */
.rbtn{width:100%;padding:11px;border-radius:8px;border:1.5px solid var(--cop);cursor:pointer;background:var(--copbg);font:700 .85rem 'Inter',sans-serif;color:var(--copd);transition:.18s all;margin-top:12px;}
.rbtn:hover{background:var(--cop);color:#fff;}
.rname{margin-top:12px;padding:11px 14px;background:var(--okbg);border:1.5px solid var(--okb);border-radius:8px;font-weight:700;color:var(--ok);text-align:center;animation:fdin .35s ease;}

/* Quiz */
.qtext{font-size:.95rem;line-height:1.7;color:var(--tx2);margin-bottom:16px;padding:12px 14px;background:var(--copbg);border-left:3px solid var(--cop);border-radius:0 6px 6px 0;}
.qopts{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.qopt{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;font:500 .88rem 'Inter',sans-serif;color:var(--tx);width:100%;transition:.18s all;text-align:left;}
.qopt:hover:not([disabled]){border-color:var(--cop);background:var(--copbg);}
.qopt .qk{font-size:.72rem;font-weight:700;color:var(--cop);min-width:14px;}
.qopt.wrong{background:var(--errbg);border-color:var(--errb);animation:shake .4s;}
.qopt.right{background:var(--okbg);border-color:var(--okb);}
.tinput-wrap{display:flex;gap:7px;margin-bottom:12px;}
.tinput{flex:1;padding:11px 13px;background:var(--bg3);border:1.5px solid var(--bds);border-radius:8px;font:600 .95rem 'Inter',sans-serif;color:var(--tx);text-transform:uppercase;letter-spacing:1px;outline:none;transition:border-color .2s;}
.tinput:focus{border-color:var(--cop);background:var(--bg2);}
.tinput.shake{animation:shake .4s;}
.tinput:disabled{opacity:.6;}
.tbtn{padding:11px 16px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--copd),var(--copl));color:#fff;font:700 .85rem 'Inter',sans-serif;white-space:nowrap;transition:.18s all;}
.tbtn:hover:not([disabled]){transform:translateY(-1px);}
.tbtn:disabled{opacity:.5;cursor:default;}
.fb{padding:9px 13px;border-radius:8px;font-size:.83rem;font-weight:500;margin-top:3px;animation:fdin .3s ease;}
.fb.wrong{background:var(--errbg);border:1px solid var(--errb);color:var(--err);}
.fb.right{background:var(--okbg);border:1px solid var(--okb);color:var(--ok);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes fdin{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* Intermission */
.inter{text-align:center;padding:48px 20px 38px;}
.inter-em{font-size:4.5rem;display:block;margin-bottom:16px;animation:popin .5s cubic-bezier(.34,1.56,.64,1);}
.inter-title{font-size:1.55rem;font-weight:900;margin-bottom:22px;}
@keyframes popin{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.bigbtn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font:700 .95rem 'Inter',sans-serif;transition:.2s all;}
.bigbtn.cop{background:linear-gradient(135deg,var(--copd),var(--copl));color:#fff;box-shadow:0 4px 14px rgba(181,113,42,.35);}
.bigbtn.cop:hover{transform:translateY(-2px);}
.bigbtn.pnk{background:linear-gradient(135deg,#c0297b,#e05090);color:#fff;box-shadow:0 4px 14px rgba(192,41,123,.35);}
.bigbtn.pnk:hover{transform:translateY(-2px);}

/* Poll */
.poll-opts{display:flex;flex-direction:column;gap:9px;margin-top:16px;}
.popt{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--bg2);border:2px solid var(--bd);border-radius:10px;cursor:pointer;font:500 1rem 'Inter',sans-serif;width:100%;transition:.2s all;}
.popt:hover{border-color:var(--cop);background:var(--copbg);transform:translateX(3px);}
.pem{font-size:1.7rem;}
.pk{font-size:.72rem;font-weight:700;color:var(--cop);}

/* Birthday */
.bday{text-align:center;padding:48px 20px 40px;}
.bday-em{font-size:3.2rem;display:inline-block;margin:0 4px 10px;animation:popin .5s cubic-bezier(.34,1.56,.64,1);}
.bday-title{font-size:1.4rem;font-weight:900;color:#c0297b;line-height:1.35;margin-top:8px;animation:fdin .6s .3s both;}
.bday-sub{font-size:.88rem;color:var(--txm);margin-top:10px;font-style:italic;animation:fdin .6s .6s both;}

/* Modal */
.moverlay{position:fixed;inset:0;z-index:100;background:rgba(26,22,18,.55);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fdin .2s;}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:26px 22px;width:100%;max-width:330px;box-shadow:0 8px 40px rgba(100,70,30,.2);position:relative;overflow:hidden;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--copd),var(--copl));}
.modal-title{font-size:1rem;font-weight:800;color:var(--tx);margin-bottom:3px;}
.modal-sub{font-size:.8rem;color:var(--txm);margin-bottom:18px;font-style:italic;}
.minput{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--bds);border-radius:8px;font:600 .95rem 'Inter',sans-serif;color:var(--tx);letter-spacing:4px;text-align:center;text-transform:uppercase;margin-bottom:10px;outline:none;transition:border-color .2s;}
.minput:focus{border-color:var(--cop);background:var(--bg2);}
.minput.shake{animation:shake .4s;}
.merr{color:var(--err);font-size:.78rem;margin-bottom:10px;text-align:center;}
.mbtns{display:flex;gap:7px;}
.mbtn2{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font:600 .76rem 'Inter',sans-serif;transition:.18s all;}
.mbtn2.ok{background:linear-gradient(135deg,var(--copd),var(--copl));color:#fff;}
.mbtn2.cancel{background:var(--bg3);color:var(--txm);border:1px solid var(--bd);}
.mbtn2.cancel:hover{color:var(--tx);}

/* Start screen */
.start{text-align:center;padding:36px 18px 32px;}
.start-logo{font-size:5rem;display:block;animation:wobble 2.4s ease-in-out infinite;}
@keyframes wobble{0%,100%{transform:rotate(-6deg) scale(1)}25%{transform:rotate(6deg) scale(1.08)}50%{transform:rotate(-4deg) scale(1.04)}75%{transform:rotate(5deg) scale(1.08)}}
.start-title{font-size:1.9rem;font-weight:900;color:var(--copd);margin:10px 0 4px;letter-spacing:.5px;}
.start-sub{font-size:.88rem;color:var(--txm);font-style:italic;margin-bottom:28px;line-height:1.55;}
.start-stations{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:28px;}
.start-pip{width:28px;height:28px;border-radius:50%;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--txm);}
.start-pip.filled{background:linear-gradient(135deg,var(--copd),var(--copl));color:#fff;}
.start-btn{width:100%;padding:15px;border-radius:12px;border:none;cursor:pointer;font:800 1.05rem 'Inter',sans-serif;background:linear-gradient(135deg,var(--copd),var(--copl));color:#fff;box-shadow:0 6px 20px rgba(181,113,42,.4);transition:.2s all;letter-spacing:.3px;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(181,113,42,.5);}
.start-facts{margin-top:20px;display:flex;flex-direction:column;gap:8px;}
.start-fact{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg3);border-radius:8px;font-size:.82rem;color:var(--tx2);text-align:left;}
.start-fact-icon{font-size:1.1rem;flex-shrink:0;}

/* Misc */
.errbox{background:var(--errbg);border:1px solid var(--errb);border-radius:8px;padding:10px 13px;margin-bottom:12px;font-size:.83rem;color:var(--err);}
.footer{margin-top:14px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
.fbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:1.5px solid var(--bd);cursor:pointer;background:var(--bg2);font:600 .68rem 'Inter',sans-serif;color:var(--txm);transition:.18s all;}
.fbtn:hover{border-color:var(--copl);color:var(--cop);background:var(--copbg);}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:200;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <button class="mbtn" id="menuBtn" onclick="toggleDrawer()">☰ Orte</button>
    <span class="hdr-icon">🍻</span>
    <div>
      <h1>Tour de Bierchen</h1>
      <small>Volle Promille voraus</small>
    </div>
  </div>
  <div class="cnt"><div id="root"></div></div>
</div>

<!-- Drawer -->
<div class="doverlay" id="doverlay">
  <div class="dbackdrop" onclick="toggleDrawer()"></div>
  <div class="drawer">
    <div class="dhdr">
      <div class="dhdr-title">🍺 Alle Stationen</div>
      <div class="dhdr-sub">Passwort eingeben zum Einspringen</div>
    </div>
    <div class="dbody"><div class="ov-list" id="ovList"></div></div>
  </div>
</div>

<div id="modalRoot"></div>
<canvas class="confetti" id="confetti"></canvas>

<script>
var RADIUS = 50;

var STATIONS = [
  { name:'Gutenbergplatz', lat:49.00868310689553, lng:8.375607376586641, pw:'OBST',
    quiz:{ type:'mc', q:'Bevor es flüssig wird, sollte eine solide Grundlage geschaffen werden. Welches Lebensmittel wäre hierfür gut geeignet?',
           opts:['Bier','Essiggurken','Obstgarten'], ans:2 }},
  { name:'Weinbrennerplatz', lat:49.00520352548003, lng:8.37664215490604, pw:'WEGBIER',
    quiz:{ type:'mc', q:'Wie viele Brauereien gab es 1846 in Karlsruhe?',
           opts:['7','15','31'], ans:2 }},
  { name:'Kühler Krug', lat:49.00366579595283, lng:8.368694692805528, pw:'KRUG',
    quiz:{ type:'mc', q:'Wie lang ist die Alb (Fluss)?',
           opts:['8 km','29 km','51 km'], ans:2 }},
  { name:'Braustübl Hatz-Moninger', lat:49.002946380423225, lng:8.355954780314383, pw:'HOPF',
    quiz:{ type:'tx',
           q:'Hier gibt es eine Namensübereinstimmung:\n\n„Ich bin der berühmteste Architekt von Karlsruhe. Ich bin unter der Stadtkirche bestattet und ich habe in Rom studiert."\n\n„In mir werden köstliche Trauben zu Alkohol. Nein ich bin kein Fass! Bei mir muss Feuer unter den Hintern!"\n\nWie lautet der gemeinsame Name?',
           ans:['WEINBRENNER','FRIEDRICH WEINBRENNER'] }},
  { name:'Badisch Brauhaus', lat:49.01184077768898, lng:8.393804989799078, pw:'FASS',
    quiz:{ type:'mc', q:'Wie lange braucht man mit einer Postkutsche von Karlsruhe nach Wien?',
           opts:['4–5 Tage','6–8 Tage','9–10 Tage'], ans:1 }},
  { name:'Vogelbräu', lat:49.00752772825499, lng:8.414033475889248, pw:'VOGEL',
    quiz:{ type:'tx',
           q:'„Ich bin ein Phantom der Evolution: Meinen Weg im Trüben finde ich nicht mit Augen, sondern durch den elektrischen Puls meiner Beute. Ich besitze den Schnabel eines Vogels und den Giftsporn eines Reptils, doch mein Körper trägt ein dichtes Fell. Obwohl ich Eier in die Dunkelheit lege, nähre ich die Jungen mit Milch – und doch bin ich kein gewöhnliches Säugetier. Wer bin ich?',
           ans:['SCHNABELTIER'] }},
  { name:'Wolfsbräu', lat:49.00166995484466, lng:8.407898181315213, pw:'WOLF',
    quiz:{ type:'mc', q:'Wo kostet der halbe Liter Bier am meisten in Karlsruhe?',
           opts:['KSC','Vogelbräu','Höpfner'], ans:0 }},
  { name:'Phono Craftbeer Bar', lat:49.01002109356422, lng:8.420217123805513, pw:'PHONO',
    quiz:{ type:'mc', q:'„Ich bin das Kind der Hitze und die Krone im Glas. 1516 blieb ich ungenannt, doch ohne mich wirkt das Bier leblos. Ich bin keine Zutat und kein Lebewesen, sondern eine flüchtige Architektur. Wer bin ich?"',
           opts:['Die Stammwürze','Der Bierschaum (Blume)','Der Sud'], ans:1 }},
  { name:'Höpfner', lat:49.01238832480083, lng:8.42651089395558, pw:'HOEP',
    quiz:{ type:'mc', q:'Wie viele Hopfensorten gibt es auf der Welt?',
           opts:['120–140','280–330','440–480'], ans:1 }}
];

var INTER = {
  0: { emoji:'🍓', title:'Frühstück',   btn:'Jetzt weiterspielen', style:'cop' },
  3: { emoji:'🍔', title:'Mittagessen', btn:'Jetzt weiterspielen', style:'cop' },
  8: { emoji:'🥩', title:'Abendessen',  btn:'Stimmung abfragen',   style:'pnk' }
};

// ── State ──────────────────────────────────────────────────────
var S = {
  step:0, phase:'start',     // start | nav | arrived | quiz | intermission | poll | birthday | done
  done:[], pwJump:false,
  lat:null, lng:null, acc:null, dist:null, hdg:null,
  gps:'idle', gpsErr:null,
  sel:null, fb:null, tries:0, txt:'',
  revealed:false,
  modal:null, mpw:'', merr:'',
  dbg:false
};

(function(){
  try {
    var raw = sessionStorage.getItem('tdb5');
    if (raw) {
      var p = JSON.parse(raw);
      S.step = p.step||0; S.phase = p.phase||'nav'; S.done = p.done||[]; S.pwJump = !!p.pwJump;
    }
  } catch(e){}
})();

function save() {
  try { sessionStorage.setItem('tdb5', JSON.stringify({step:S.step,phase:S.phase,done:S.done,pwJump:S.pwJump})); } catch(e){}
}

// ── GPS ───────────────────────────────────────────────────────
var watchId = null;
function startGPS() {
  if (!navigator.geolocation) { S.gps='error'; S.gpsErr='GPS nicht verfügbar.'; render(); return; }
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId=null; }
  S.gps='active'; render();
  watchId = navigator.geolocation.watchPosition(
    function(p) {
      S.lat=p.coords.latitude; S.lng=p.coords.longitude; S.acc=Math.round(p.coords.accuracy);
      S.gps='active'; S.gpsErr=null;
      var wasNav = (S.phase==='nav');
      tick();
      if (wasNav) render(); // only re-render from GPS ticks during nav phase
    },
    function(e) { S.gps='error'; var m=['','Berechtigung verweigert.','Position nicht verfügbar.','Zeitüberschreitung.']; S.gpsErr=m[e.code]||'GPS-Fehler.'; render(); },
    {enableHighAccuracy:true, maximumAge:5000, timeout:15000}
  );
}

function haversine(a,b,c,d) {
  var R=6371000, r=Math.PI/180;
  var dL=(c-a)*r, dO=(d-b)*r;
  var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dO/2)*Math.sin(dO/2);
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function bearing(a,b,c,d) {
  var r=Math.PI/180;
  var y=Math.sin((d-b)*r)*Math.cos(c*r);
  var x=Math.cos(a*r)*Math.sin(c*r)-Math.sin(a*r)*Math.cos(c*r)*Math.cos((d-b)*r);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function dirStr(deg) { return ['Nord','Nordost','Ost','Südost','Süd','Südwest','West','Nordwest'][Math.round(deg/45)%8]; }

function tick() {
  if (S.lat===null || S.phase!=='nav') return;
  var st=STATIONS[S.step];
  S.dist = Math.round(haversine(S.lat,S.lng,st.lat,st.lng));
  S.hdg  = bearing(S.lat,S.lng,st.lat,st.lng);
  if (S.dist<=RADIUS) { S.phase='arrived'; S.revealed=false; save(); }
}

function startTour() { S.phase='nav'; save(); render(); startGPS(); }

  // ── Actions ───────────────────────────────────────────────────
function revealName()    { S.revealed=true; render(); }
function goToQuiz()      { S.phase='quiz'; S.sel=null; S.fb=null; S.tries=0; S.txt=''; save(); render(); }

function pickOption(idx) {
  if (S.fb==='right') return;
  S.sel=idx;
  if (idx===STATIONS[S.step].quiz.ans) { S.fb='right'; render(); setTimeout(advance,1500); }
  else { S.tries++; S.fb='wrong'; render(); }
}

function submitText() {
  if (S.fb==='right') return;
  var v=(S.txt||'').trim().toUpperCase();
  if (!v) return;
  var ok=STATIONS[S.step].quiz.ans.some(function(a){return a===v;});
  if (ok) { S.fb='right'; render(); setTimeout(advance,1500); }
  else {
    S.tries++; S.fb='wrong'; render();
    var el=document.getElementById('ti');
    if (el) { el.classList.add('shake'); setTimeout(function(){var e=document.getElementById('ti');if(e)e.classList.remove('shake');},450); }
  }
}
function textKey(e) { if (e.key==='Enter') submitText(); }

function advance() {
  if (S.done.indexOf(S.step)<0) S.done.push(S.step);
  S.pwJump=false;
  if (INTER[S.step]!==undefined) {
    S.phase='intermission';
  } else if (S.step+1>=STATIONS.length) {
    S.phase='done';
  } else {
    S.step++; S.phase='nav'; S.dist=null; S.hdg=null; S.sel=null; S.fb=null; S.tries=0; S.txt=''; S.revealed=false;
  }
  save(); render();
}

function afterInter() {
  if (S.step+1>=STATIONS.length) { S.phase='poll'; }
  else { S.step++; S.phase='nav'; S.dist=null; S.hdg=null; S.sel=null; S.fb=null; S.tries=0; S.txt=''; S.revealed=false; }
  save(); render();
}

function vote() { S.phase='birthday'; save(); render(); setTimeout(confetti,400); }

// ── Drawer ────────────────────────────────────────────────────
function toggleDrawer() {
  var ov=document.getElementById('doverlay'), btn=document.getElementById('menuBtn');
  var isOpen=ov.classList.contains('open');
  if (isOpen) { ov.classList.remove('open'); btn.classList.remove('on'); }
  else { ov.classList.add('open'); btn.classList.add('on'); buildOvList(); }
}
function buildOvList() {
  var html='';
  for (var i=0;i<STATIONS.length;i++) {
    var isDone=S.done.indexOf(i)>=0, isAct=(i===S.step&&!isDone);
    var cls='ov-item'+(isDone?' done':isAct?' active':'');
    var icon=isDone?'✅':isAct?'▶':'🔒';
    var st=isDone?'Abgeschlossen':isAct?'Aktuelle Station':'Passwort erforderlich';
    html+='<div class="'+cls+'" onclick="ovClick('+i+')">'
         +'<div class="ov-num">'+(i+1)+'</div>'
         +'<div class="ov-info"><div class="ov-name">Station '+(i+1)+'</div><div class="ov-st">'+st+'</div></div>'
         +'<span>'+icon+'</span></div>';
  }
  document.getElementById('ovList').innerHTML=html;
}
function ovClick(i) {
  if (S.done.indexOf(i)>=0) return;
  openModal(i);
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(i) { S.modal=i; S.mpw=''; S.merr=''; renderModal(); setTimeout(function(){var e=document.getElementById('mpwInput');if(e)e.focus();},80); }
function closeModal() { S.modal=null; document.getElementById('modalRoot').innerHTML=''; }
function confirmPw() {
  var got=(S.mpw||'').trim().toUpperCase(), exp=STATIONS[S.modal].pw.toUpperCase();
  if (got===exp) {
    var si=S.modal;
    for (var i=0;i<si;i++) { if (S.done.indexOf(i)<0) S.done.push(i); }
    S.step=si; S.phase='quiz'; S.pwJump=true; S.sel=null; S.fb=null; S.tries=0; S.txt=''; S.revealed=false;
    document.getElementById('doverlay').classList.remove('open');
    document.getElementById('menuBtn').classList.remove('on');
    closeModal(); save(); render();
  } else {
    S.merr='Falsches Passwort.';
    var el=document.getElementById('mpwInput');
    if (el) { el.classList.add('shake'); setTimeout(function(){var e=document.getElementById('mpwInput');if(e)e.classList.remove('shake');},450); }
    renderModal();
  }
}
function mpwKey(e) { if(e.key==='Enter')confirmPw(); if(e.key==='Escape')closeModal(); }
function renderModal() {
  if (S.modal===null) { document.getElementById('modalRoot').innerHTML=''; return; }
  document.getElementById('modalRoot').innerHTML=
    '<div class="moverlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal"><div class="modal-title">Station '+(S.modal+1)+' entsperren</div>'
    +'<div class="modal-sub">Passwort eingeben</div>'
    +'<input id="mpwInput" class="minput" type="text" maxlength="16" placeholder="PASSWORT" '
    +'oninput="S.mpw=this.value" onkeydown="mpwKey(event)" autocomplete="off" spellcheck="false">'
    +(S.merr?'<div class="merr">✗ '+S.merr+'</div>':'')
    +'<div class="mbtns">'
    +'<button class="mbtn2 cancel" onclick="closeModal()">Abbrechen</button>'
    +'<button class="mbtn2 ok" onclick="confirmPw()">Entsperren</button>'
    +'</div></div></div>';
  var el=document.getElementById('mpwInput'); if(el){el.value=S.mpw;el.focus();}
}

// ── Helpers ───────────────────────────────────────────────────
function warmth(d) {
  if(d===null) return '🧭🧭🧭';
  if(d>500) return '🧊🧊🧊'; if(d>300) return '🧊🧊🔥'; if(d>100) return '🧊🔥🔥';
  if(d>RADIUS) return '🔥🔥🔥'; return '🎯🎯🎯';
}
function fmtDist(d) { if(d===null) return '—'; return d>=1000?(d/1000).toFixed(1)+' km':d+' m'; }
function distCls(d) { if(!d)return ''; return d<=30?'close':d<=150?'near':''; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Confetti ──────────────────────────────────────────────────
function confetti() {
  var cv=document.getElementById('confetti'), cx=cv.getContext('2d');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  var ps=[],cs=['#e05090','#f0a030','#56c46a','#4090e0','#c040c0','#f0e030'];
  for(var i=0;i<120;i++) ps.push({x:Math.random()*cv.width,y:-20-Math.random()*180,w:7+Math.random()*9,h:4+Math.random()*5,r:Math.random()*6.28,vx:(Math.random()-.5)*3,vy:2+Math.random()*4,vr:(Math.random()-.5)*.15,c:cs[Math.floor(Math.random()*cs.length)]});
  var t0=Date.now();
  function fr(){
    var el=Date.now()-t0; cx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.globalAlpha=Math.max(0,1-(el-1500)/1500);cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();});
    if(el<3000)requestAnimationFrame(fr);else cx.clearRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(fr);
}

// ── Render ────────────────────────────────────────────────────
function render() {
  var root=document.getElementById('root');
  if(!root) return;
  try { root.innerHTML = buildHTML(); } catch(e) { root.innerHTML='<div class="errbox">⚠️ Fehler: '+e.message+'</div>'; console.error(e); }
  // Restore text input value without resetting cursor
  if(S.phase==='quiz') {
    var ti=document.getElementById('ti');
    if(ti && document.activeElement!==ti) ti.value=S.txt;
  }
}

function buildHTML() {
  var n=STATIONS.length, done=S.done.length, st=STATIONS[Math.min(S.step,n-1)];
  var special=(S.phase==='intermission'||S.phase==='poll'||S.phase==='birthday');
  var h='';

  // Progress dots
  if (!special) {
    var dots='';
    for (var i=0;i<n;i++) {
      var dc=S.done.indexOf(i)>=0?'done':(i===S.step&&S.phase==='quiz')?'quiz':i===S.step?'active':'';
      dots+='<div class="dot '+dc+'"></div>';
    }
    h+='<div class="prog"><div class="prog-lbl"><span>Fortschritt</span><span>'+done+' / '+n+'</span></div><div class="prog-dots">'+dots+'</div></div>';
  }

  // GPS badge
  if (!special && S.phase!=='done') {
    var gc=S.gps==='active'?'ok':S.gps==='error'?'err':'';
    var gl=S.gps==='active'?('GPS aktiv'+(S.acc?' · ±'+S.acc+'m':'')):S.gps==='error'?'GPS-Fehler':'GPS inaktiv';
    h+='<div class="gpsbadge"><div class="gpsdot '+gc+'"></div>'+gl+'</div>';
    if(S.gpsErr) h+='<div class="errbox">⚠️ '+S.gpsErr+'</div>';
  }

  // Phase rendering
  if (S.phase==='start') {
    var pips='';
    for(var pi=0;pi<STATIONS.length;pi++) pips+='<div class="start-pip">'+(pi+1)+'</div>';
    h+='<div class="card start"><div class="cline cop"></div>'
      +'<span class="start-logo">🍻</span>'
      +'<div class="start-title">Tour de Bierchen</div>'
      +'<div class="start-sub">Volle Promille voraus — deine epische<br>Bierschnitzeljagd durch Karlsruhe</div>'
      +'<div class="start-stations">'+pips+'</div>'
      +'<button class="start-btn" onclick="startTour()">Tour starten 🚀</button>'
      +'<div class="start-facts">'
      +'<div class="start-fact"><span class="start-fact-icon">📍</span><span><strong>9 Stationen</strong> quer durch die Stadt</span></div>'
      +'<div class="start-fact"><span class="start-fact-icon">🧩</span><span><strong>Rätsel</strong> an jeder Station lösen</span></div>'
      +'<div class="start-fact"><span class="start-fact-icon">🧭</span><span><strong>GPS-Navigation</strong> führt euch zum Ziel</span></div>'
      +'</div></div>';

  } else if (S.phase==='intermission') {
    var im=INTER[S.step];
    h+='<div class="card inter"><div class="cline cop"></div>'
      +'<span class="inter-em">'+im.emoji+'</span>'
      +'<div class="inter-title">'+im.title+'</div>'
      +'<button class="bigbtn '+im.style+'" onclick="afterInter()">'+im.btn+' →</button></div>';

  } else if (S.phase==='poll') {
    h+='<div class="card"><div class="cline pnk"></div>'
      +'<div class="stag" style="color:#c0297b;background:#fdf0f7;border-color:rgba(192,41,123,.2)">🗳 Abstimmung</div>'
      +'<div class="ctitle">Wie geht es dir?</div>'
      +'<div class="poll-opts">'
      +'<button class="popt" onclick="vote()"><span class="pk">A</span><span class="pem">🤮</span></button>'
      +'<button class="popt" onclick="vote()"><span class="pk">B</span><span class="pem">😴</span></button>'
      +'<button class="popt" onclick="vote()"><span class="pk">C</span><span class="pem">🥳</span></button>'
      +'</div></div>';

  } else if (S.phase==='birthday') {
    h+='<div class="card bday"><div class="cline pnk"></div>'
      +'<span class="bday-em">🎂</span><span class="bday-em" style="animation-delay:.15s">🎉</span><span class="bday-em" style="animation-delay:.3s">🎈</span>'
      +'<div class="bday-title">Alles Gute zum<br>30. Geburtstag ❤️</div>'
      +'<div class="bday-sub">Tour de Bierchen erfolgreich abgeschlossen!</div></div>';

  } else if (S.phase==='done') {
    h+='<div class="card" style="text-align:center;padding:34px 18px"><div class="cline grn"></div>'
      +'<div style="font-size:3rem;margin-bottom:12px">🍺</div>'
      +'<div style="font-size:1.3rem;font-weight:900;color:var(--copd);margin-bottom:8px">Tour abgeschlossen!</div>'
      +'<div style="font-size:.88rem;color:var(--txm);font-style:italic">Alle '+n+' Stationen besucht. Prost! 🍻</div></div>';

  } else if (S.phase==='nav') {
    var em=warmth(S.dist), rot=S.hdg||0, ac=S.hdg!==null?'#b5712a':'#c0b090';
    var svg='<svg viewBox="0 0 28 28" fill="none" style="transform:rotate('+rot+'deg);transition:transform .6s cubic-bezier(.34,1.56,.64,1)">'
           +'<polygon points="14,3 19,20 14,17 9,20" fill="'+ac+'" opacity=".92"/>'
           +'<polygon points="14,3 9,20 14,17 19,20" fill="'+ac+'" opacity=".28"/></svg>';
    var dir=S.hdg!==null?dirStr(S.hdg):'Warte…';
    h+='<div class="card"><div class="cline cop"></div>'
      +'<div class="stag">⚑ '+(S.step+1)+' / '+n+' · Navigation</div>'
      +'<div class="ctitle">Station '+(S.step+1)+'</div>'
      +'<div class="hint">Navigiere zur nächsten Station.</div>'
      +'<div class="navw">'
      +'<div><div class="distval '+distCls(S.dist)+'">'+fmtDist(S.dist)+'</div><div class="distlbl">Entfernung</div><div class="emojis">'+em+'</div></div>'
      +'<div class="compass"><div class="cring"><div class="clbls"><span class="cl cl-n">N</span><span class="cl cl-e">O</span><span class="cl cl-s">S</span><span class="cl cl-w">W</span></div>'+svg+'</div><div class="cdir">'+dir+'</div></div>'
      +'</div></div>';

  } else if (S.phase==='arrived') {
    h+='<div class="card"><div class="cline cop"></div>'
      +'<div class="stag">📍 '+(S.step+1)+' / '+n+' · Angekommen</div>'
      +'<div class="ctitle">Station '+(S.step+1)+' erreicht!</div>';
    if (S.revealed) {
      h+='<div class="rname">🎉 '+st.name+'</div>'
        +'<button class="rbtn" style="margin-top:12px" onclick="goToQuiz()">Weiter zum Rätsel →</button>';
    } else {
      h+='<p style="font-size:.88rem;color:var(--tx2);line-height:1.6;margin-bottom:2px">Du hast das Ziel erreicht. Möchtest du wissen, wo du bist?</p>'
        +'<button class="rbtn" onclick="revealName()">🔍 Ort enthüllen</button>';
    }
    h+='</div>';

  } else if (S.phase==='quiz') {
    var qz=st.quiz, uCls=S.fb==='right'?' unlocked':'';
    var qbody='';
    if (qz.type==='mc') {
      var opts='';
      for (var j=0;j<qz.opts.length;j++) {
        var ocls='qopt'+(S.sel===j?(S.fb==='right'?' right':' wrong'):'');
        var dis=S.fb==='right'?'disabled':'';
        opts+='<button class="'+ocls+'" onclick="pickOption('+j+')" '+dis+'>'
             +'<span class="qk">'+['A','B','C'][j]+'</span><span>'+qz.opts[j]+'</span></button>';
      }
      qbody='<div class="qopts">'+opts+'</div>';
    } else {
      var dis2=S.fb==='right'?'disabled':'';
      qbody='<div class="tinput-wrap">'
           +'<input id="ti" class="tinput" type="text" placeholder="Antwort eingeben …" '
           +'oninput="S.txt=this.value" onkeydown="textKey(event)" autocomplete="off" spellcheck="false" '+dis2+'>'
           +'<button class="tbtn" onclick="submitText()" '+dis2+'>✓</button>'
           +'</div>';
    }
    var nextLbl=INTER[S.step]!==undefined?'Kurze Pause…':S.step+1<n?'Weiter…':'Fast fertig…';
    var fbHtml='';
    if(S.fb==='wrong') fbHtml='<div class="fb wrong">✗ Leider falsch'+(S.tries>1?' (Versuch '+S.tries+')':'')+'. Nochmal!</div>';
    if(S.fb==='right') fbHtml='<div class="fb right">✓ Richtig! '+nextLbl+'</div>';
    var qtext=qz.q.replace(/\n/g,'<br>');
    h+='<div class="card'+uCls+'"><div class="cline amb"></div>'
      +'<div class="stag amb">🔐 '+(S.step+1)+' / '+n+' · Rätsel</div>'
      +'<div class="ctitle">'+st.name+'</div>'
      +'<div class="qtext">'+qtext+'</div>'
      +qbody+fbHtml+'</div>';
  }

  // Debug
  if (S.dbg && st && ['nav','arrived','quiz'].indexOf(S.phase)>=0) {
    h+='<div style="background:#f0ebe3;border:1px solid var(--bd);border-radius:8px;padding:11px;margin-bottom:12px;font:normal .68rem monospace;color:var(--txm);line-height:1.9">'
      +'<strong style="color:var(--copd)">Debug</strong><br>'
      +'Pos: '+(S.lat?S.lat.toFixed(6):'?')+', '+(S.lng?S.lng.toFixed(6):'?')+'<br>'
      +'Ziel: '+st.lat.toFixed(6)+', '+st.lng.toFixed(6)+'<br>'
      +'Dist: '+S.dist+'m · R: '+RADIUS+'m · Hdg: '+(S.hdg?Math.round(S.hdg)+'°':'-')+'<br>'
      +'Phase: '+S.phase+' · Step: '+(S.step+1)+'/'+n+'</div>';
  }

  h+='<div class="footer">'
    +'<button class="fbtn" onclick="startGPS()">🔄 GPS neu</button>'
    +'<button class="fbtn" onclick="S.dbg=!S.dbg;render()">⚙</button>'
    +'<button class="fbtn" onclick="doReset()">↺ Reset</button>'
    +'</div>';

  return h;
}

function doReset() {
  if (!confirm('Fortschritt zurücksetzen?')) return;
  S.step=0;S.phase='nav';S.done=[];S.pwJump=false;S.dist=null;S.hdg=null;
  S.sel=null;S.fb=null;S.tries=0;S.txt='';S.revealed=false;
  try{sessionStorage.removeItem('tdb5');}catch(e){}
  render();
}

render();
setTimeout(function(){
  // Only auto-start GPS if we're past the start screen (i.e. resuming a session)
  if (S.phase !== 'start') startGPS();
}, 400);
</script>
